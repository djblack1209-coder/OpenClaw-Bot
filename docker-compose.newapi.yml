# New-API (songquanpeng/new-api) — OpenAI API 管理/分发网关
# 用于替换自研 LLM 路由的底层通道管理
# 启动: docker compose -f docker-compose.newapi.yml up -d
# 管理界面: http://localhost:3000

services:
  new-api:
    # 固定版本号，避免 latest 导致不可预期的升级
    image: calciumion/new-api:v0.12.6
    container_name: openclaw-newapi
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data/newapi:/data
    environment:
      - TZ=Asia/Shanghai
      - INITIAL_ROOT_TOKEN=${NEWAPI_INITIAL_TOKEN:?请在 .env 中设置 NEWAPI_INITIAL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
