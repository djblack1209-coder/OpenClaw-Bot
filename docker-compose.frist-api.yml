# Frist-API 独立公开中转站原型
# 本地预览: docker compose -f docker-compose.frist-api.yml up -d
# 网站: http://127.0.0.1:3180

services:
  frist-api-server:
    image: node:22-alpine
    container_name: frist-api-server
    restart: unless-stopped
    working_dir: /app
    command: ["node", "server/server.js"]
    ports:
      - "127.0.0.1:3180:3180"
    volumes:
      - ./apps/frist-api:/app:ro
      - ./data/frist-api/runtime:/data
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=${NODE_ENV:-development}
      - FRIST_API_HOST=0.0.0.0
      - FRIST_API_PORT=3180
      - FRIST_API_DATA_FILE=/data/runtime.json
      - FRIST_API_PUBLIC_MODE=${FRIST_API_PUBLIC_MODE:-0}
      - FRIST_API_ADMIN_TOKEN=${FRIST_API_ADMIN_TOKEN:-frist-api-dev-admin-token}
      - FRIST_API_ADMIN_PAGE_CODE=${FRIST_API_ADMIN_PAGE_CODE:-}
      - FRIST_API_ADMIN_CLAIM_CODES=${FRIST_API_ADMIN_CLAIM_CODES:-}
      - FRIST_API_SESSION_SECRET=${FRIST_API_SESSION_SECRET:-frist-api-dev-session-secret-change-before-production}
      - FRIST_API_PASSWORD_HASH_SECRET=${FRIST_API_PASSWORD_HASH_SECRET:-}
      - FRIST_API_LEGACY_PASSWORD_HASH_SECRETS=${FRIST_API_LEGACY_PASSWORD_HASH_SECRETS:-}
      - FRIST_API_DATA_ENCRYPTION_KEY=${FRIST_API_DATA_ENCRYPTION_KEY:-}
      - FRIST_API_PUBLIC_GATEWAY_BASE_URL=${FRIST_API_PUBLIC_GATEWAY_BASE_URL:-}
      - FRIST_API_CANONICAL_HOST=${FRIST_API_CANONICAL_HOST:-}
      - FRIST_API_REDIRECT_HOSTS=${FRIST_API_REDIRECT_HOSTS:-}
      - FRIST_API_ENFORCE_PRODUCTION_READINESS=${FRIST_API_ENFORCE_PRODUCTION_READINESS:-0}
      - FRIST_API_ALLOW_INSECURE_PUBLIC_HTTP=${FRIST_API_ALLOW_INSECURE_PUBLIC_HTTP:-0}
      - FRIST_API_PROBE_TIMEOUT_MS=${FRIST_API_PROBE_TIMEOUT_MS:-2500}
      - FRIST_API_ALLOW_DEMO_RECHARGE=${FRIST_API_ALLOW_DEMO_RECHARGE:-0}
      - FRIST_API_EXPOSE_VERIFICATION_CODE=${FRIST_API_EXPOSE_VERIFICATION_CODE:-0}
      - FRIST_API_REQUIRE_CSRF=${FRIST_API_REQUIRE_CSRF:-0}
      - FRIST_API_REQUIRE_ADMIN_2FA=${FRIST_API_REQUIRE_ADMIN_2FA:-0}
      - FRIST_API_ADMIN_TOTP_SECRETS=${FRIST_API_ADMIN_TOTP_SECRETS:-}
      - FRIST_API_ADMIN_2FA_SESSION_TTL_MS=${FRIST_API_ADMIN_2FA_SESSION_TTL_MS:-3600000}
      - FRIST_API_ALLOW_PRIVATE_UPSTREAM_URLS=${FRIST_API_ALLOW_PRIVATE_UPSTREAM_URLS:-0}
      - FRIST_API_BACKUP_STATUS_MAX_AGE_HOURS=${FRIST_API_BACKUP_STATUS_MAX_AGE_HOURS:-26}
      - FRIST_API_SLA_RETENTION_DAYS=${FRIST_API_SLA_RETENTION_DAYS:-30}
      - FRIST_API_REQUIRE_CAPTCHA=${FRIST_API_REQUIRE_CAPTCHA:-0}
      - FRIST_API_CAPTCHA_MAX_ATTEMPTS=${FRIST_API_CAPTCHA_MAX_ATTEMPTS:-3}
      - FRIST_API_PASSWORD_RESET_TTL_MS=${FRIST_API_PASSWORD_RESET_TTL_MS:-900000}
      - FRIST_API_AUTH_RATE_LIMIT_MAX=${FRIST_API_AUTH_RATE_LIMIT_MAX:-20}
      - FRIST_API_AUTH_RATE_LIMIT_WINDOW_MS=${FRIST_API_AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      - FRIST_API_LOW_INVENTORY_WEBHOOK=${FRIST_API_LOW_INVENTORY_WEBHOOK:-}
      - FRIST_API_SMTP_HOST=${FRIST_API_SMTP_HOST:-}
      - FRIST_API_SMTP_PORT=${FRIST_API_SMTP_PORT:-465}
      - FRIST_API_SMTP_SECURE=${FRIST_API_SMTP_SECURE:-1}
      - FRIST_API_SMTP_FAMILY=${FRIST_API_SMTP_FAMILY:-auto}
      - FRIST_API_SMTP_USER=${FRIST_API_SMTP_USER:-}
      - FRIST_API_SMTP_PASSWORD=${FRIST_API_SMTP_PASSWORD:-}
      - FRIST_API_SMTP_FROM=${FRIST_API_SMTP_FROM:-}
      - FRIST_API_BALANCE_ALERT_FROM_NAME=${FRIST_API_BALANCE_ALERT_FROM_NAME:-Frist-API Billing}
      - FRIST_API_PAYMENT_ENABLED=${FRIST_API_PAYMENT_ENABLED:-0}
      - FRIST_API_WECHAT_PAY_ENABLED=${FRIST_API_WECHAT_PAY_ENABLED:-0}
      - FRIST_API_WECHAT_PAY_APPID=${FRIST_API_WECHAT_PAY_APPID:-}
      - FRIST_API_WECHAT_PAY_MCH_ID=${FRIST_API_WECHAT_PAY_MCH_ID:-}
      - FRIST_API_WECHAT_PAY_SERIAL_NO=${FRIST_API_WECHAT_PAY_SERIAL_NO:-}
      - FRIST_API_WECHAT_PAY_PRIVATE_KEY=${FRIST_API_WECHAT_PAY_PRIVATE_KEY:-}
      - FRIST_API_WECHAT_PAY_PUBLIC_KEY=${FRIST_API_WECHAT_PAY_PUBLIC_KEY:-}
      - FRIST_API_WECHAT_PAY_API_V3_KEY=${FRIST_API_WECHAT_PAY_API_V3_KEY:-}
      - FRIST_API_WECHAT_PAY_NOTIFY_URL=${FRIST_API_WECHAT_PAY_NOTIFY_URL:-}
      - FRIST_API_ALIPAY_ENABLED=${FRIST_API_ALIPAY_ENABLED:-0}
      - FRIST_API_ALIPAY_APP_ID=${FRIST_API_ALIPAY_APP_ID:-}
      - FRIST_API_ALIPAY_PRIVATE_KEY=${FRIST_API_ALIPAY_PRIVATE_KEY:-}
      - FRIST_API_ALIPAY_PUBLIC_KEY=${FRIST_API_ALIPAY_PUBLIC_KEY:-}
      - FRIST_API_ALIPAY_NOTIFY_URL=${FRIST_API_ALIPAY_NOTIFY_URL:-}
      - FRIST_API_NEWAPI_ENABLED=${FRIST_API_NEWAPI_ENABLED:-0}
      - FRIST_API_REQUIRE_NEWAPI_DATABASE=${FRIST_API_REQUIRE_NEWAPI_DATABASE:-0}
      - FRIST_API_NEWAPI_BASE_URL=${FRIST_API_NEWAPI_BASE_URL:-}
      - FRIST_API_NEWAPI_ACCESS_TOKEN=${FRIST_API_NEWAPI_ACCESS_TOKEN:-}
      - FRIST_API_NEWAPI_USER_ID=${FRIST_API_NEWAPI_USER_ID:-}
      - FRIST_API_NEWAPI_DEFAULT_GROUP=${FRIST_API_NEWAPI_DEFAULT_GROUP:-default}
      - FRIST_API_NEWAPI_DEFAULT_TOKEN_QUOTA=${FRIST_API_NEWAPI_DEFAULT_TOKEN_QUOTA:-0}
      - FRIST_API_NEWAPI_GATEWAY_ENABLED=${FRIST_API_NEWAPI_GATEWAY_ENABLED:-0}
      - FRIST_API_NEWAPI_GATEWAY_BASE_URL=${FRIST_API_NEWAPI_GATEWAY_BASE_URL:-}
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3180/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
