# OpenClaw Bot 日志轮转配置 (macOS newsyslog)
#
# 安装方式:
#   sudo cp scripts/newsyslog.openclaw.conf /etc/newsyslog.d/openclaw.conf
#   sudo newsyslog -CN                    # 验证配置
#
# 字段说明:
#   logfilename          [owner:group]  mode  count  size(KB)  when  flags  [/pid_file] [sig_num]
#
# 规则: 每个日志文件最大 50MB，保留 5 个归档，使用 gzip 压缩
# 总磁盘占用上限: ~250MB (5 × 50MB)

