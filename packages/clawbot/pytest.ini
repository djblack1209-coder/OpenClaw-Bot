[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 默认选项: 首个失败即停止 + 简洁回溯 + 禁用警告噪音
addopts = -x --tb=short -q
# 过滤第三方库的 DeprecationWarning 噪音
filterwarnings =
    ignore::DeprecationWarning:telegram.*
    ignore::DeprecationWarning:httpx.*
    ignore::DeprecationWarning:litellm.*
