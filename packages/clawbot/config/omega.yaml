    #   chinese_understanding: "qwen3-235b-a22b"
    #   code_tasks: "claude-code-cli"
    #   local_private: "ollama/qwen2.5"
    #   intent_parsing: "qwen3-235b-a22b"
    #   investment_analysis: "claude-sonnet-4"
    #   content_generation: "qwen3-235b-a22b"

  # ── 社媒运营 ────────────────────────────────────────
