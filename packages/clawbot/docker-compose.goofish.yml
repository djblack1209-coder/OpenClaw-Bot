# ai-goofish-monitor 独立部署配置
# 用法: docker compose -f docker-compose.goofish.yml up -d
#
# 部署后:
#   - Web UI: http://localhost:8000 (admin/admin123)
#   - API: http://localhost:8000/docs
#   - ClawBot 通过 GOOFISH_MONITOR_URL=http://localhost:8000 连接

services:
  goofish-monitor:
    image: ghcr.io/usagi-org/ai-goofish:latest
    container_name: goofish-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./config/.env.goofish
    volumes:
      - ./data/goofish:/app/data
      - ./data/goofish/state:/app/state
      - ./data/goofish/prompts:/app/prompts
      - ./data/goofish/logs:/app/logs
      - ./data/goofish/images:/app/images
