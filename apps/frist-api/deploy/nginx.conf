server {
  listen 80;
  server_name 101-43-41-96.nip.io;

  return 301 http://frist-api.101-43-41-96.nip.io$request_uri;
}

server {
  listen 80;
  server_name frist-api.101-43-41-96.nip.io;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://frist-api-newapi:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/ {
    proxy_pass http://frist-api-newapi:3000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
