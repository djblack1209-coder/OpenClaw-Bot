<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frist-API 管理工作台</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./src/styles.css?v=20260504-refero-shell" />
  </head>
  <body data-design-system="refero-hyperstudio">
    <main class="admin-shell">
      <header class="admin-topbar">
        <a class="brand" href="./admin.html" aria-label="Frist-API 管理端">
          <span class="brand-mark" aria-hidden="true">
            <i></i>
            <b></b>
          </span>
          <span>Frist-API Admin</span>
        </a>
        <span class="action-message" data-admin-message>等待连接本地服务</span>
      </header>

      <section class="admin-hero">
        <span class="eyebrow">库存、卡密与路由</span>
        <h1>运营工作台</h1>
        <p>生成可售兑换码、维护号源库存和确认异常订单。用户端只看到兑换入口，不暴露上游和管理能力。</p>
      </section>

      <div class="admin-grid">
        <section class="plain-section">
          <div class="section-head">
            <div>
              <span class="eyebrow">身份</span>
              <h2>管理员令牌</h2>
            </div>
            <button class="ghost-action" data-admin-save-token type="button">保存</button>
          </div>
          <div class="form-stack">
            <label>
              管理员令牌
              <input type="password" data-admin-token placeholder="FRIST_API_ADMIN_TOKEN" />
            </label>
          </div>
        </section>

        <section class="plain-section admin-span" data-admin-pricing>
          <div class="section-head">
            <div>
              <span class="eyebrow">价格</span>
              <h2>套餐与模型计价</h2>
            </div>
            <button class="primary-action" data-admin-pricing-save type="button">保存价格</button>
          </div>
          <div class="admin-two-col">
            <label>
              充值套餐 JSON
              <textarea data-admin-plans rows="12" spellcheck="false" placeholder='[{"id":"codex-30-day","quotaUsd":30,"priceCny":5.88,"durationDays":1}]'></textarea>
            </label>
            <label>
              模型官方价格 JSON
              <textarea data-admin-model-prices rows="12" spellcheck="false" placeholder='[{"model":"gpt-5.5","inputSaleCnyPerMillion":8,"outputSaleCnyPerMillion":48}]'></textarea>
            </label>
          </div>
        </section>

        <section class="plain-section">
          <div class="section-head">
            <div>
              <span class="eyebrow">异常兜底</span>
              <h2>人工入账</h2>
            </div>
            <button class="secondary-action" data-admin-credit type="button">入账</button>
          </div>
          <div class="form-stack">
            <label>
              用户邮箱
              <input type="email" data-admin-credit-email placeholder="customer@example.com" />
            </label>
            <label>
              入账金额
              <input type="number" data-admin-credit-amount min="0.01" step="0.01" placeholder="8.00" />
            </label>
            <label>
              入账类型
              <select data-admin-credit-plan>
                <option value="balance">余额</option>
                <option value="day">日卡</option>
                <option value="month">月卡</option>
              </select>
            </label>
          </div>
        </section>

        <section class="plain-section admin-span" data-admin-redemption-cards>
          <div class="section-head">
            <div>
              <span class="eyebrow">兑换码</span>
              <h2>卡密生成与闲鱼发货</h2>
            </div>
            <button class="primary-action" data-admin-card-create type="button">生成卡密</button>
          </div>
          <div class="admin-card-grid">
            <label>
              对应套餐
              <select data-admin-card-plan></select>
            </label>
            <label>
              数量
              <input type="number" data-admin-card-quantity min="1" max="200" step="1" value="10" />
            </label>
            <label>
              前缀
              <input type="text" data-admin-card-prefix value="FRIST" maxlength="10" />
            </label>
            <label>
              备注
              <input type="text" data-admin-card-note placeholder="闲鱼商品、批次或活动名" />
            </label>
          </div>
          <div class="admin-card-actions">
            <button class="secondary-action" data-admin-card-copy type="button">复制本批卡密</button>
            <span data-admin-card-summary>暂无新批次。</span>
          </div>
          <textarea class="admin-card-export" data-admin-card-export rows="8" spellcheck="false" readonly placeholder="生成后这里会出现可复制给闲鱼自动发货系统的卡密清单。"></textarea>
          <div class="admin-card-list" data-admin-card-list></div>
        </section>

        <section class="plain-section">
          <div class="section-head">
            <div>
              <span class="eyebrow">接入</span>
              <h2>请求地址与池子</h2>
            </div>
          </div>
          <div class="form-stack">
            <label>
              请求地址
              <input type="url" data-admin-base-url placeholder="https://supplier.example.com/v1" />
            </label>
            <label>
              代理请求地址
              <input type="url" data-admin-proxy-url placeholder="https://proxy.example.com/v1（可选）" />
            </label>
            <label>
              套餐池
              <select data-admin-pool>
                <option value="day">日卡池</option>
                <option value="month">月卡池</option>
                <option value="default">默认池</option>
              </select>
            </label>
            <label>
              探测模式
              <select data-admin-probe-mode>
                <option value="auto">自动探测</option>
                <option value="strict">严格探测</option>
                <option value="trusted">信任写入</option>
              </select>
            </label>
            <label>
              渠道类型
              <select data-admin-source-type>
                <option value="authorized">授权供应商 / 自有额度</option>
                <option value="cpa_json_backup">CPA JSON 备用渠道</option>
                <option value="chong_backup">chong 备用渠道</option>
                <option value="manual_backup">其他人工备用渠道</option>
              </select>
            </label>
            <label>
              风险状态
              <select data-admin-risk-status>
                <option value="approved">已人工核验，可路由</option>
                <option value="quarantined">待人工核验，先隔离</option>
                <option value="blocked">禁止路由</option>
              </select>
            </label>
            <label class="check-row">
              <input type="checkbox" data-admin-backup-risk-accepted />
              <span>备用渠道已完成合规与风险判断，允许进入路由</span>
            </label>
            <label>
              风险备注
              <textarea data-admin-risk-note rows="3" placeholder="记录人工判断依据、来源责任人、可用范围和复核时间。"></textarea>
            </label>
            <label>
              支持模型
              <textarea data-admin-models rows="4" placeholder="claude-opus-4-6-thinking-c&#10;gpt-5.5"></textarea>
            </label>
          </div>
        </section>

        <section class="plain-section admin-span">
          <div class="section-head">
            <div>
              <span class="eyebrow">清洗</span>
              <h2>订单详情</h2>
            </div>
            <button class="secondary-action" data-admin-parse-order type="button">解析订单</button>
          </div>
          <label class="form-stack">
            订单详情
            <textarea data-admin-order-text rows="9" placeholder="直接粘贴订单详情页，系统会识别请求地址、Key、额度、卡类型和模型。"></textarea>
          </label>
          <div class="admin-inventory-summary" data-admin-inventory-summary></div>
        </section>

        <section class="plain-section admin-span">
          <div class="section-head">
            <div>
              <span class="eyebrow">补充</span>
              <h2>Key 与价格文本</h2>
            </div>
            <button class="primary-action" data-admin-replenish type="button">写入库存</button>
          </div>
          <div class="admin-two-col">
            <label>
              Key 列表
              <textarea data-admin-keys rows="10" placeholder="sk-xxx&#10;sk-yyy,900,120&#10;或 JSON 数组 [{&quot;value&quot;:&quot;sk-xxx&quot;,&quot;quotaRemaining&quot;:900}]"></textarea>
            </label>
            <label>
              价格文本
              <textarea data-admin-price-text rows="10" placeholder="claude-opus-4-6-thinking-c input $15/1M output $75/1M"></textarea>
            </label>
          </div>
        </section>

        <section class="plain-section admin-span">
          <div class="section-head">
            <div>
              <span class="eyebrow">库存</span>
              <h2>当前号源状态</h2>
            </div>
            <button class="secondary-action" data-admin-refresh type="button">刷新</button>
          </div>
          <div class="admin-inventory" data-admin-inventory></div>
        </section>

        <section class="plain-section admin-span">
          <div class="section-head">
            <div>
              <span class="eyebrow">审计</span>
              <h2>最近操作</h2>
            </div>
          </div>
          <div class="admin-audit" data-admin-audit></div>
        </section>
      </div>
    </main>

    <script type="module" src="./src/admin.js?v=20260504-refero-shell"></script>
  </body>
</html>
