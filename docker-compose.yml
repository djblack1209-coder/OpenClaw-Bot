services:
  # docker compose 默认只读取仓库根目录 .env。
  # 当前真实密钥放在 packages/clawbot/config/.env，因此用变量值强制要求调用方显式注入，避免 Redis 空密码启动。
  # 推荐: docker compose --env-file packages/clawbot/config/.env up -d
  # ── Redis（可选，用于任务队列持久化）──────────────
  redis:
    image: redis:7.2-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    # 安全: REDIS_PASSWORD 必须通过 .env 文件或环境变量设置，不提供默认值
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD:?请通过 --env-file packages/clawbot/config/.env 或环境变量设置 REDIS_PASSWORD}"
    restart: unless-stopped
    # 安全: 非 root 用户运行 (redis 镜像内置 redis 用户)
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    # 资源限制: 2GB 服务器，Redis 分配 128M 足够（仅做队列缓存）
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?请通过 --env-file packages/clawbot/config/.env 或环境变量设置 REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      # Redis 只在内部网络，不暴露给外部
      - clawbot-internal

  # ── OpenClaw 主服务 ──────────────────────────────
  # NOTE: 需要先创建 packages/clawbot/Dockerfile 才能使用 docker compose build
  # 当前仅支持 docker compose up redis (Redis 独立运行)
  openclaw:
    build:
      context: ./packages/clawbot
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:18790:18790"   # 内控 API（仅本机访问）
      - "127.0.0.1:9090:9090"     # Prometheus metrics（仅本机访问）
    volumes:
      - ./packages/clawbot/config:/app/config
      - ./packages/clawbot/data:/app/data
      - ./packages/clawbot/logs:/app/logs
    env_file:
      - ./packages/clawbot/config/.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?请通过 --env-file packages/clawbot/config/.env 或环境变量设置 REDIS_PASSWORD}@redis:6379/0
      - OMEGA_DAILY_BUDGET=50.0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 安全: 限制容器权限
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # 资源限制: 2GB 服务器，主服务分配 1G（含 Python 运行时 + 业务逻辑）
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18790/api/v1/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      # 应用服务同时接入内部网络（访问 Redis）和外部网络（访问 Telegram/LLM API）
      - clawbot-internal
      - clawbot-external

volumes:
  redis_data:

networks:
  # 内部网络: Redis 专用，隔离外网访问，仅容器间通信
  clawbot-internal:
    driver: bridge
    internal: true
  # 外部网络: openclaw 主服务用，允许访问 Telegram Bot API / LLM API 等外部服务
  clawbot-external:
    driver: bridge
