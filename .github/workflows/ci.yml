# Monorepo CI — Python 后端测试 + 前端类型检查 + Lint
# 触发: push/PR 到 main 分支（排除纯文档变更）
# 优化: uv 缓存 / npm 缓存 / 路径过滤 / 已知失败排除

name: OpenEverything CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'AUDIT_PLAN.md'
      - 'AGENTS.md'
      - 'scripts/nightly-audit/**'
      - 'apps/openclaw/**'
      - '!apps/openclaw-manager-src/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'AUDIT_PLAN.md'
      - 'AGENTS.md'
      - 'scripts/nightly-audit/**'
      - 'apps/openclaw/**'
      - '!apps/openclaw-manager-src/**'

# 同一分支的新推送取消正在跑的旧 CI，节省 Actions 分钟数
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python 后端测试 + Lint ───
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/clawbot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('packages/clawbot/requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements-dev.txt

      - name: Ruff lint check
        run: |
          uv pip install --system ruff
          ruff check src/ --config ruff.toml \
            --select E,W,F,B \
            --ignore E501,E402,E701,E702,E741,B008,B905,B904,B004,B005,B007

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --tb=short -q \
            --cov=src --cov-report=term-missing \
            --timeout=120 \
            -o "addopts=" \
            2>&1 | tee pytest-output.txt
          # 允许最多 15 个预存失败（当前已知 13 个）
          # 如果失败数超过 15 说明引入了新回归
          FAILED_COUNT=$(grep -oP '\d+ failed' pytest-output.txt | grep -oP '\d+' || echo "0")
          echo "Failed tests: $FAILED_COUNT"
          if [ "$FAILED_COUNT" -gt 15 ]; then
            echo "::error::回归检测: 失败测试数 $FAILED_COUNT 超过阈值 15（预存已知 13 个）"
            exit 1
          fi
          echo "✅ 测试通过 (失败数 $FAILED_COUNT <= 阈值 15)"
        env:
          # 测试环境变量，避免依赖外部服务
          TESTING: "true"
          LITELLM_LOG: "ERROR"

      - name: Syntax check source files
        run: |
          python -m py_compile multi_main.py
          find src/ -name "*.py" -exec python -m py_compile {} +

  # ─── 前端 TypeScript 类型检查 ───
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/openclaw-manager-src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/openclaw-manager-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
