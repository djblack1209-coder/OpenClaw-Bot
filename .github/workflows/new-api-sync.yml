name: New-API Scheduled Sync

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: new-api-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check current New-API release
        id: check
        shell: bash
        run: |
          set +e
          scripts/sync_new_api_upstream.sh check >new-api-check.log 2>&1
          status=$?
          set -e
          cat new-api-check.log
          if [ "$status" -eq 0 ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          elif [ "$status" -eq 2 ]; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          else
            exit "$status"
          fi

      - name: Sync submodule pointer and compose image
        if: steps.check.outputs.needs_sync == 'true'
        run: make new-api-sync

      - name: Validate compose config
        if: steps.check.outputs.needs_sync == 'true'
        env:
          NEWAPI_INITIAL_TOKEN: ci-compose-validation-only
        run: docker compose -f docker-compose.newapi.yml config >/tmp/new-api-compose.yml

      - name: Create pull request
        if: steps.check.outputs.needs_sync == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync New-API upstream release'
          title: 'chore: sync New-API upstream release'
          body: |
            自动定时同步 `QuantumNous/new-api` 最新非草稿 release。

            已执行：
            - `scripts/sync_new_api_upstream.sh check`
            - `make new-api-sync`
            - `docker compose -f docker-compose.newapi.yml config`

            合并后部署 New-API 前仍需先备份 `data/newapi`。
          branch: codex/new-api-scheduled-sync
          delete-branch: true
          add-paths: |
            .gitmodules
            packages/new-api-upstream
            docker-compose.newapi.yml
