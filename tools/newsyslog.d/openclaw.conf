# OpenClaw Bot — newsyslog log rotation configuration
# Install: sudo cp tools/newsyslog.d/openclaw.conf /etc/newsyslog.d/openclaw.conf
# Verify:  sudo newsyslog -nv
# Manual:  sudo newsyslog -f /etc/newsyslog.d/openclaw.conf
#
# Format: logfilename [owner:group] mode count size(KB) when flags
#   mode  = file permissions after rotation
#   count = number of rotated files to keep
#   size  = rotate when file exceeds this size (in KB)
#   when  = time-based rotation (* = any time, size-only)
#   flags = J (bzip2 compress), Z (gzip), G (UTC timestamps)
#
